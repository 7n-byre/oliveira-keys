<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLIVEIRA - PRESTIGE PANEL</title>
    <style>
        /* Reset de Estilos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Animação Automática de Cor entre Preto e Vermelho */
        @keyframes autoGlowBg {
            0% { background-color: #000000; }
            50% { background-color: #3a0000; }
            100% { background-color: #000000; }
        }

        /* Efeito de Pulso Neon nas Bordas e Textos */
        @keyframes pulseNeon {
            0% { border-color: #ff0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.5); }
            50% { border-color: #000000; box-shadow: 0 0 5px rgba(255, 0, 0, 0.1); }
            100% { border-color: #ff0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.5); }
        }

        body {
            animation: autoGlowBg 6s infinite ease-in-out;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background-color 1s ease;
        }

        /* Layout do Dashboard */
        .dashboard {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Título do Topo */
        .main-header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: -10px;
        }

        .main-header h1 {
            font-size: 4rem;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 12px;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
        }

        /* Painéis Modernos */
        .card-panel {
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid #ff0000;
            border-radius: 16px;
            padding: 35px;
            animation: pulseNeon 5s infinite ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
        }

        .panel-header {
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 2px solid #ff0000;
            padding-bottom: 12px;
            margin-bottom: 25px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        /* Inputs e Selects */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: #ff4d4d;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .select-field, .input-field {
            width: 100%;
            background: #000000;
            border: 1px solid rgba(255, 0, 0, 0.5);
            border-radius: 8px;
            padding: 15px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .select-field:focus, .input-field:focus {
            border-color: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
        }

        /* Botão Principal */
        .btn-core {
            width: 100%;
            background: linear-gradient(90deg, #990000 0%, #ff0000 100%);
            color: #fff;
            border: none;
            padding: 16px;
            font-size: 1.05rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
        }

        .btn-core:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
            box-shadow: 0 8px 25px rgba(255, 0, 0, 0.6);
        }

        /* Caixa de Saída Multi-Keys */
        .output-box {
            margin-top: 25px;
            background: #050505;
            border: 1px dashed #ff0000;
            border-radius: 8px;
            padding: 20px;
            display: none;
        }

        .keys-list-container {
            max-height: 180px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 5px;
        }

        /* Scrollbar customizada */
        .keys-list-container::-webkit-scrollbar {
            width: 6px;
        }
        .keys-list-container::-webkit-scrollbar-thumb {
            background-color: #ff0000;
            border-radius: 4px;
        }

        .key-item {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.25rem;
            color: #00ff66;
            font-weight: bold;
            text-align: center;
            letter-spacing: 2px;
            background: #000;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #111;
            margin-bottom: 8px;
        }

        .success-message {
            font-size: 0.85rem;
            color: #00ff66;
            text-align: center;
            margin-top: 12px;
            font-weight: bold;
            letter-spacing: 0.5px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 10px;
        }

        /* Linhas de Resultados do Testador */
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 0, 0, 0.15);
        }

        .data-row:last-child {
            border-bottom: none;
        }

        .data-title {
            color: #888;
        }

        .data-info {
            font-weight: bold;
        }

        .text-live { color: #00ff66; text-shadow: 0 0 5px rgba(0, 255, 102, 0.3); }
        .text-alert { color: #ff3333; }
        .text-ip { color: #00ffff; font-family: monospace; }

        .btn-copy {
            background: transparent;
            border: 1px solid #00ff66;
            color: #00ff66;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            display: block;
            margin: 0 auto;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn-copy:hover {
            background: #00ff66;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        
        <!-- Cabeçalho Principal -->
        <header class="main-header">
            <h1>Oliveira</h1>
        </header>

        <!-- PAINEL 1: GERADOR MULTI-KEYS INFINITO -->
        <div class="card-panel">
            <div>
                <div class="panel-header">Geração de Acessos</div>
                
                <div class="form-group">
                    <label>Tempo de Validade:</label>
                    <select class="select-field" id="select-days">
                        <option value="1">1 Dia</option>
                        <option value="7">7 Dias</option>
                        <option value="15">15 Dias</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Quantidade de Chaves a Gerar:</label>
                    <select class="select-field" id="select-quantity">
                        <option value="1">Gerar 1 Key</option>
                        <option value="5">Gerar 5 Keys</option>
                        <option value="10">Gerar 10 Keys</option>
                        <option value="20">Gerar 20 Keys</option>
                    </select>
                </div>

                <div class="data-row" style="border-bottom: none; margin-bottom: 10px;">
                    <span class="data-title">Banco de Dados de Chaves:</span>
                    <span class="data-info text-live" style="letter-spacing: 1px;">⚙ INFINITO</span>
                </div>
            </div>

            <div>
                <button class="btn-core" onclick="generateSystemKeys()">Gerar Acessos</button>

                <div class="output-box" id="box-generator">
                    <div class="keys-list-container" id="container-keys-list">
                        <!-- As chaves geradas entram aqui -->
                    </div>
                    <button class="btn-copy" onclick="copyAllGeneratedKeys()">Copiar Lista de Chaves</button>
                    <div class="success-message">
                        ✓ Sua Key foi gerada com sucesso! Agora você pode enviar para seu cliente.
                    </div>
                </div>
            </div>
        </div>

        <!-- PAINEL 2: TESTADOR DE CREDENCIAIS (REALISTA) -->
        <div class="card-panel">
            <div>
                <div class="panel-header">Teste Key</div>
                
                <div class="form-group">
                    <label>Insira uma Chave para Análise:</label>
                    <input type="text" class="input-field" id="input-key" placeholder="Cole uma KEY-OLIVEIRA-XXXX aqui">
                </div>
            </div>

            <div>
                <button class="btn-core" style="background: #000; border: 1px solid #ff0000;" onclick="checkKeyLiveDetails()">Verificar Dados de Registro</button>

                <div class="output-box" id="box-tester">
                    <div class="data-row">
                        <span class="data-title">Chave Identificada:</span>
                        <span class="data-info" id="info-name" style="color: #ff3333; font-family: monospace;">-</span>
                    </div>
                    <div class="data-row">
                        <span class="data-title">Status Global:</span>
                        <span class="data-info" id="info-status">-</span>
                    </div>
                    <div class="data-row">
                        <span class="data-title">Duração Definida:</span>
                        <span class="data-info" id="info-time">-</span>
                    </div>
                    <div class="data-row">
                        <span class="data-title">IP Registrado:</span>
                        <span class="data-info text-ip" id="info-ip">-</span>
                    </div>
                    <div class="data-row">
                        <span class="data-title">Seu Aparelho Atual:</span>
                        <span class="data-info" id="info-device" style="color: #00ffff; font-size: 0.85rem;">-</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Banco de dados em memória local para simular a autenticação das chaves
        const globalKeysStorage = {};

        // Banco de IPs falsos realistas para associar
        const staticIpsList = ["187.12.91.241", "200.54.120.33", "179.211.84.105", "190.98.201.44", "186.22.13.72"];

        // Função inteligente para detectar o modelo real do aparelho de quem está mexendo
        function fetchCurrentDevice() {
            const agent = navigator.userAgent;
            if (/Android/i.test(agent)) {
                const matchAndroid = agent.match(/Android\s+([^\s;]+);\s+([^\s;]+)/);
                if (matchAndroid && matchAndroid[2]) return matchAndroid[2].replace(/_/g, ' ');
                return "Dispositivo Android (Mobile)";
            }
            if (/iPhone/i.test(agent)) return "Apple iPhone (iOS)";
            if (/Windows/i.test(agent)) return "PC Windows (Web/Ambiente Local)";
            return "Aparelho Mobile Identificado";
        }

        function generateSystemKeys() {
            const validityDays = document.getElementById('select-days').value;
            const keysQty = parseInt(document.getElementById('select-quantity').value);
            const listContainer = document.getElementById('container-keys-list');
            
            // Limpa gerações anteriores do bloco visual
            listContainer.innerHTML = '';

            for (let i = 0; i < keysQty; i++) {
                // Cria os 4 números aleatórios (Ex: 8374)
                const randomId = Math.floor(1000 + Math.random() * 9000);
                const completeKey = `KEY-OLIVEIRA-${randomId}`;

                // Seleciona informações aleatórias para vincular a esta chave específica
                const simulatedIp = staticIpsList[Math.floor(Math.random() * staticIpsList.length)];
                const deviceInUse = fetchCurrentDevice();

                // Armazena no banco dinâmico
                globalKeysStorage[completeKey] = {
                    time: validityDays + (parseInt(validityDays) === 1 ? ' Dia' : ' Dias'),
                    status: 'Ativo / Liberado',
                    ip: simulatedIp,
                    device: deviceInUse
                };

                // Adiciona o item visualmente na lista
                const divKeyItem = document.createElement('div');
                divKeyItem.className = 'key-item';
                divKeyItem.innerText = completeKey;
                listContainer.appendChild(divKeyItem);
            }

            // Exibe a caixa do gerador
            document.getElementById('box-generator').style.display = 'block';
        }

        function copyAllGeneratedKeys() {
            const keyItems = document.querySelectorAll('.key-item');
            let textCollection = "";
            
            keyItems.forEach(item => {
                textCollection += item.innerText + "\n";
            });

            navigator.clipboard.writeText(textCollection.trim()).then(() => {
                alert('Toda a lista de chaves gerada foi copiada para sua área de transferência!');
            });
        }

        function checkKeyLiveDetails() {
            const typedInput = document.getElementById('input-key').value.trim();
            const testerBox = document.getElementById('box-tester');

            if (!typedInput) {
                alert('Insira uma chave para que o sistema possa analisar!');
                return;
            }

            // Se a chave constar no banco local dinâmico
            if (globalKeysStorage[typedInput]) {
                const verifiedData = globalKeysStorage[typedInput];

                document.getElementById('info-name').innerText = typedInput;
                document.getElementById('info-status').innerText = verifiedData.status;
                document.getElementById('info-status').className = "data-info text-live";
                document.getElementById('info-time').innerText = verifiedData.time;
                document.getElementById('info-ip').innerText = verifiedData.ip;
                document.getElementById('info-device').innerText = verifiedData.device;
            } else {
                // Se a chave não constar no banco (Inexistente/Incorreta)
                document.getElementById('info-name').innerText = typedInput;
                document.getElementById('info-status').innerText = "Inexistente ou Expirada";
                document.getElementById('info-status').className = "data-info text-alert";
                document.getElementById('info-time').innerText = "Nenhum";
                document.getElementById('info-ip').innerText = "0.0.0.0";
                document.getElementById('info-device').innerText = fetchCurrentDevice();
            }

            testerBox.style.display = 'block';
        }
    </script>
</body>
  </html>
